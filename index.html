<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 多益單字快速刷題系統</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Microsoft JhengHei', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #1b365d; font-size: 24px; margin-bottom: 20px; }
        .score-board {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .word-display {
            font-size: 38px;
            font-weight: bold;
            color: #2b6cb0;
            margin: 35px 0;
            letter-spacing: 0.5px;
        }
        .options-zone {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .option-btn:hover {
            background-color: #ebf8ff;
            border-color: #bee3f8;
            color: #2b6cb0;
        }
        .option-btn.correct {
            background-color: #c6f6d5 !important;
            border-color: #48bb78 !important;
            color: #22543d !important;
        }
        .option-btn.wrong {
            background-color: #fed7d7 !important;
            border-color: #f56565 !important;
            color: #742a2a !important;
        }
        .admin-zone {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 10px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .admin-btn {
            background-color: #4a5568;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .admin-btn:hover { background-color: #2d3748; }
    </style>
</head>
<body>

<div class="container">
    <h1>TOEIC 多益雙語核心單字衝刺</h1>
    
    <div class="score-board">
        <div>已答題數: <span id="total-count">0</span></div>
        <div>已累積錯題字數: <span id="wrong-vocab-count">0</span> 個</div>
    </div>

    <!-- 顯示出題目：英文單字 -->
    <div class="word-display" id="target-word">載入字庫中...</div>

    <!-- 顯示出5個中文選項 -->
    <div class="options-zone" id="options-container">
        <button class="option-btn">正在載入選項...</button>
    </div>

    <!-- 資料庫管理按鈕（供第二階段程式串接） -->
    <div class="admin-zone">
        <button class="admin-btn" onclick="exportWrongData()">匯出錯題數據 (JSON)</button>
        <button class="admin-btn" style="background-color: #c53030;" onclick="clearTrackingData()">重設所有紀錄</button>
    </div>
</div>

<script>
    let wordsData = {};    // 存放主字庫 { "apple": "蘋果", ... }
    let wordKeys = [];     // 存放純英文單字的陣列 [ "apple", "banana", ... ]
    let currentWord = "";  // 當前題目的英文
    let correctMeaning = ""; // 當前題目的正確中文
    let trackingData = JSON.parse(localStorage.getItem('toeic_wrong_track_v2')) || {};
    let answerClicked = false;
    let totalAnswered = 0;

    // 1. 從 GitHub 空間中讀取剛產出的中英對照資料庫
    fetch('words_db.json')
        .then(response => response.json())
        .then(data => {
            wordsData = data;
            wordKeys = Object.keys(data);
            updateScoreBoard();
            nextQuestion();
        })
        .catch(err => {
            document.getElementById('target-word').innerText = "讀取錯誤";
            console.error("無法正確讀取 words_db.json，請確認檔案是否存在於同目錄中。", err);
        });

    // 2. 隨機生成下一題
    function nextQuestion() {
        if (wordKeys.length < 5) {
            alert("字庫單字量不足 5 個，無法建立 5 選 1 測驗。");
            return;
        }
        answerClicked = false;
        
        // 隨機抽選 1 個英文單字作為正確答案
        const targetIndex = Math.floor(Math.random() * wordKeys.length);
        currentWord = wordKeys[targetIndex];
        correctMeaning = wordsData[currentWord];
        
        // 渲染題目到畫面上
        document.getElementById('target-word').innerText = currentWord;

        // 隨機抓取 4 個其他單字的「中文中文釋義」作為干擾選項
        let distractorMeanings = [];
        while(distractorMeanings.length < 4) {
            let randKey = wordKeys[Math.floor(Math.random() * wordKeys.length)];
            let randMeaning = wordsData[randKey];
            
            // 避免抓到與正確答案相同，或是重複的中文解釋
            if(randKey !== currentWord && !distractorMeanings.includes(randMeaning)) {
                distractorMeanings.push(randMeaning);
            }
        }

        // 把正確答案與 4 個錯誤答案混合，打包成 5 個選項
        let allOptions = [
            { text: correctMeaning, isCorrect: true },
            { text: distractorMeanings[0], isCorrect: false },
            { text: distractorMeanings[1], isCorrect: false },
            { text: distractorMeanings[2], isCorrect: false },
            { text: distractorMeanings[3], isCorrect: false }
        ];
        
        // 洗牌演算法：隨機打亂 5 個選項的排序
        allOptions.sort(() => Math.random() - 0.5);

        // 渲染選項按鈕到畫面上
        const container = document.getElementById('options-container');
        container.innerHTML = "";

        allOptions.forEach(option => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option.text;
            btn.onclick = () => handleAnswer(btn, option.isCorrect);
            container.appendChild(btn);
        });
    }

    // 3. 處理點擊選項後的邏輯
    function handleAnswer(selectedBtn, isCorrect) {
        if (answerClicked) return; // 鎖定狀態，防止連點造成重複計算
        answerClicked = true;
        totalAnswered++;

        if (isCorrect) {
            selectedBtn.classList.add('correct');
        } else {
            selectedBtn.classList.add('wrong');
            
            // 後台紀錄：錯誤次數累計與時間戳記更新
            if (!trackingData[currentWord]) {
                trackingData[currentWord] = { 
                    chinese_meaning: correctMeaning,
                    wrong_count: 0, 
                    last_tested: "" 
                };
            }
            trackingData[currentWord].wrong_count += 1;
            trackingData[currentWord].last_tested = new Date().toISOString();
            
            // 寫入瀏覽器的本機快取(LocalStorage)，網頁關掉也不會消失
            localStorage.setItem('toeic_wrong_track_v2', JSON.stringify(trackingData));
            
            // 自動高亮顯示正確的中文答案，協助大腦加深記憶
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                if (btn.innerText === correctMeaning) btn.classList.add('correct');
            });
        }

        updateScoreBoard();

        // 極速無縫切換：答對留 0.4 秒，答錯留 1 秒看正確答案，隨後自動跳下一題
        setTimeout(nextQuestion, isCorrect ? 400 : 1000);
    }

    // 4. 更新計分板資訊
    function updateScoreBoard() {
        document.getElementById('total-count').innerText = totalAnswered;
        document.getElementById('wrong-vocab-count').innerText = Object.keys(trackingData).length;
    }

    // 5. 導出錯題資料功能 (匯出 JSON，為第二階段做準備)
    function exportWrongData() {
        if (Object.keys(trackingData).length === 0) {
            alert("目前尚無任何錯題紀錄喔！");
            return;
        }
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(trackingData, null, 4));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "toeic_wrong_tracking_data.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    // 6. 清除快取資料
    function clearTrackingData() {
        if(confirm("確定要將所有累積的錯題與練習紀錄清空重來嗎？")) {
            localStorage.removeItem('toeic_wrong_track_v2');
            trackingData = {};
            totalAnswered = 0;
            updateScoreBoard();
            nextQuestion();
        }
    }
</script>

</body>
</html>
